name: 🎬 Auto Upload Reels

on:
  schedule:
    # Every 6 hours → 4 runs/day × 3 uploads = 12 reels/day
    - cron: '0 0 * * *'     # 12:00 AM UTC
    - cron: '0 6 * * *'     #  6:00 AM UTC
    - cron: '0 12 * * *'    # 12:00 PM UTC
    - cron: '0 18 * * *'    #  6:00 PM UTC
  # Manual trigger button in GitHub Actions UI
  workflow_dispatch:

# Only one upload job at a time (queue, don't cancel)
concurrency:
  group: reel-uploader
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload-reels:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # ~5.8 hours (GitHub hard max = 6 hours)

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🎬 Run Auto Uploader
        env:
          IG_USERNAME:      ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:      ${{ secrets.IG_PASSWORD }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_API_KEY:   ${{ secrets.GDRIVE_API_KEY }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 💾 Final progress save
        if: always()
        run: |
          git config user.name "Reel Bot"
          git config user.email "bot@reelbot.com"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto: final save"
          git push
